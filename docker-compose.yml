services:
  postgres:
    image: postgres:17
    container_name: outlook_postgres
    environment:
      POSTGRES_DB: outlook
      POSTGRES_USER: outlookapp
      POSTGRES_PASSWORD: Test1234!
    ports:
      - '5434:5432'
    volumes:
      - outlook-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U outlookapp -d outlook']
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  outlook-pgdata:
